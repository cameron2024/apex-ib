<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mock Results — Apex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .page-header { margin-bottom: 28px; animation: fadeUp .35s ease both; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -.4px; line-height: 1.2; margin-bottom: 5px; }
  .page-sub { font-size: 14px; color: var(--text-secondary); }

  /* ── HEADLINE SCORE ─────────────────── */
  .headline {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 36px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 36px;
    align-items: center;
    animation: fadeUp .4s ease both;
  }
  @media (max-width:780px){ .headline{grid-template-columns:1fr;text-align:center;} }

  .score-dial {
    position: relative;
    width: 160px; height: 160px;
    margin: auto;
  }
  .score-dial svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-dial-track { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-dial-fill  { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1); }
  .score-dial-fill.high { stroke: #15803D; }
  .score-dial-fill.mid  { stroke: #B45309; }
  .score-dial-fill.low  { stroke: #B91C1C; }
  .score-dial-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-value { font-family: 'DM Serif Display', serif; font-size: 44px; letter-spacing: -1px; line-height: 1; }
  .score-of   { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }

  .headline-body { min-width: 0; }
  .headline-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 5px; }
  .headline-verdict { font-family: 'DM Serif Display', serif; font-size: 24px; letter-spacing: -.3px; line-height: 1.3; margin-bottom: 8px; }
  .headline-meta { font-size: 13px; color: var(--text-secondary); display: flex; gap: 18px; flex-wrap: wrap; }
  .headline-meta strong { color: var(--text-primary); font-weight: 600; }

  /* ── PER-TOPIC ───────────────────────── */
  .topic-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 24px;
    animation: fadeUp .4s ease .05s both;
  }
  .topic-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: -.2px;
    margin-bottom: 18px;
  }
  .topic-row {
    display: grid;
    grid-template-columns: 140px 1fr 56px;
    align-items: center;
    gap: 16px;
    padding: 9px 0;
  }
  .topic-row + .topic-row { border-top: 1px solid #F2F0EC; }
  .topic-name { font-size: 13.5px; color: var(--text-primary); font-weight: 500; }
  .topic-bar-bg { background: var(--bg); height: 8px; border-radius: 4px; overflow: hidden; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .topic-bar-fill.high { background: #16A34A; }
  .topic-bar-fill.mid  { background: #D97706; }
  .topic-bar-fill.low  { background: #DC2626; }
  .topic-score { font-size: 14px; font-weight: 600; text-align: right; }

  /* ── STRONG / WEAK ANSWERS ───────────── */
  .answer-section { animation: fadeUp .4s ease .1s both; }
  .answer-section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: -.2px;
    margin-bottom: 14px;
    margin-top: 24px;
  }
  .answer-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 12px;
  }
  .answer-card.strong { border-left: 3px solid #16A34A; }
  .answer-card.weak { border-left: 3px solid #DC2626; }
  .answer-card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .answer-score { font-size: 17px; font-weight: 600; }
  .answer-score.high { color: #15803D; }
  .answer-score.mid { color: #B45309; }
  .answer-score.low { color: #B91C1C; }
  .answer-question { font-size: 13.5px; color: var(--text-secondary); flex: 1; line-height: 1.45; }
  .answer-body { font-size: 13.5px; color: var(--text-primary); line-height: 1.6; margin-bottom: 8px; }
  .answer-verdict { font-size: 13px; color: var(--text-secondary); font-style: italic; }
  .answer-strengths, .answer-gaps { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-top: 6px; }
  .answer-strengths strong, .answer-gaps strong { color: var(--text-primary); font-weight: 600; font-style: normal; }
  .answer-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .q-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 4px; }
  .q-tag.accounting  { background: #EEF2FF; color: #4338CA; }
  .q-tag.enterprise  { background: #FFF7ED; color: #C2410C; }
  .q-tag.valuation   { background: #F0FDF4; color: #15803D; }
  .q-tag.dcf         { background: #EFF6FF; color: #1D4ED8; }
  .q-tag.mergers     { background: #FDF4FF; color: #7E22CE; }
  .q-tag.lbo         { background: #FFF1F2; color: #BE123C; }
  .answer-time { font-size: 11.5px; color: var(--text-tertiary); margin-left: auto; }

  /* ── CTA BAR ─────────────────────────── */
  .cta-bar {
    background: var(--text-primary);
    color: white;
    border-radius: 14px;
    padding: 22px 28px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    animation: fadeUp .4s ease .15s both;
  }
  .cta-bar-body { flex: 1; min-width: 240px; }
  .cta-bar-title { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 4px; }
  .cta-bar-sub { font-size: 13px; opacity: 0.78; line-height: 1.5; }
  .btn-cta {
    padding: 11px 22px;
    background: white;
    color: var(--text-primary);
    border-radius: 8px;
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Detail expansion */
  .answer-expand { background: none; border: none; color: var(--accent-blue); font-size: 12.5px; font-family: inherit; cursor: pointer; padding: 0; margin-top: 6px; }
  .answer-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .answer-detail.open { display: block; }

  .loading-pulse {
    text-align: center; padding: 80px 20px; color: var(--text-tertiary); font-size: 14px;
  }
  .full-answers-toggle {
    background: none; border: 1px solid var(--border); padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px;
    color: var(--text-secondary); margin-top: 8px;
  }
  .full-answers-toggle:hover { border-color: var(--text-primary); color: var(--text-primary); }
</style>
</head>

<body data-page="mock-results">

<div id="sidebar-mount"></div>
<script src="sidebar.js"></script>

<main class="main">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:5px;">
      <a href="mock-interview.html" style="font-size:12.5px;color:var(--text-tertiary);text-decoration:none;">← All mocks</a>
    </div>
    <div class="page-title" id="pageTitle">Mock Interview Results</div>
    <div class="page-sub" id="pageSub">Loading your report…</div>
  </div>

  <div id="content">
    <div class="loading-pulse">Loading…</div>
  </div>
</main>


<script>
  const token = localStorage.getItem('apex_token');
  const name = window.getApexName ? window.getApexName() : (function(){ try { var r=localStorage.getItem('apex_user'); if(!r||r==='undefined')return localStorage.getItem('apex_name')||''; var p=JSON.parse(r); return typeof p==='object'?p.name||'':p||''; } catch(e){ return localStorage.getItem('apex_name')||''; } })();
  const sessionId = new URLSearchParams(window.location.search).get('id');

  if (!token) { window.location.href = 'auth.html?next=' + encodeURIComponent(window.location.pathname + window.location.search); }
  if (name && token) {
    const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initials;
    if (document.getElementById('sidebarUserName')) document.getElementById('sidebarUserName').textContent = name;
  }
  if (token) {
    fetch('/api/progress/load', { headers: { 'Authorization': 'Bearer ' + token }})
      .then(r => r.json()).then(d => {
        window._userPlan = d.plan || 'free';
        window._gradedToday = d.gradedToday || 0;
        if (typeof initSidebarMenu === 'function') initSidebarMenu(window._userPlan, window._gradedToday);
      }).catch(()=>{});
  }

  if (!sessionId) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;padding:40px;">Missing session ID.</p>';
  }

  const TOPIC_CLASS = { Accounting:'accounting', Enterprise_Value:'enterprise', Valuation:'valuation', DCF:'dcf', Mergers_MA:'mergers', LBO:'lbo' };
  const TOPIC_LABEL = { Accounting:'Accounting', Enterprise_Value:'Enterprise Value', Valuation:'Valuation', DCF:'DCF', Mergers_MA:'M&A', LBO:'LBO' };
  const FORMAT_LABEL = { first_round: 'First Round', superday: 'Superday', custom: 'Custom' };

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scoreClass(s) { return s >= 85 ? 'high' : s >= 70 ? 'mid' : 'low'; }
  function fmtDuration(sec) {
    if (!sec || sec < 0) return '—';
    const m = Math.floor(sec / 60); const s = sec % 60;
    return `${m}m ${s}s`;
  }

  function verdictFromScore(s) {
    if (s >= 90) return 'Interview-ready performance';
    if (s >= 80) return 'Strong — minor sharpening needed';
    if (s >= 70) return 'Solid foundation with notable gaps';
    if (s >= 60) return 'Material gaps — focused review needed';
    return 'Needs significant work before next round';
  }

  async function loadResult() {
    try {
      const r = await fetch(`/api/mock/result?id=${sessionId}`, { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) {
        const err = await r.json().catch(()=>({}));
        document.getElementById('content').innerHTML = `<p style="text-align:center;padding:40px;color:var(--text-secondary);">${escapeHtml(err.error||'Failed to load result')}</p>`;
        return;
      }
      const data = await r.json();
      render(data);
    } catch(e) {
      document.getElementById('content').innerHTML = `<p style="text-align:center;padding:40px;">Error: ${escapeHtml(e.message)}</p>`;
    }
  }

  function render(data) {
    const overall = data.overall || 0;
    const cls = scoreClass(overall);
    document.getElementById('pageSub').textContent = `${FORMAT_LABEL[data.format] || data.format} • ${(data.grades||[]).length} questions • ${fmtDuration(data.durationSec)}`;

    // Sort grades: skipped last; among scored, weakest first for "weak" list, strongest first for "strong" list
    const scored = (data.grades || []).filter(g => g.verdict !== 'Skipped');
    const skipped = (data.grades || []).filter(g => g.verdict === 'Skipped');
    const strongAnswers = [...scored].sort((a,b) => b.score - a.score).slice(0, 3);
    const weakAnswers = [...scored].sort((a,b) => a.score - b.score).slice(0, 3);
    // Build weak-question id list for drill CTA
    const weakIds = weakAnswers.map(g => g.questionId).filter(Boolean);
    const drillUrl = weakIds.length > 0
      ? `practice-screen.html?focus=${encodeURIComponent(weakIds[0])}`
      : 'practice-screen.html?mode=review_weak';

    // Circumference for SVG ring (r=70)
    const C = 2 * Math.PI * 70;
    const offset = C - (overall / 100) * C;

    let html = `
      <div class="headline">
        <div class="score-dial">
          <svg viewBox="0 0 160 160">
            <circle class="score-dial-track" cx="80" cy="80" r="70"/>
            <circle class="score-dial-fill ${cls}" cx="80" cy="80" r="70"
                    stroke-dasharray="${C}" stroke-dashoffset="${C}" id="dialFill"/>
          </svg>
          <div class="score-dial-center">
            <div class="score-value">${overall}</div>
            <div class="score-of">/ 100</div>
          </div>
        </div>
        <div class="headline-body">
          <div class="headline-eyebrow">Overall</div>
          <div class="headline-verdict">${verdictFromScore(overall)}</div>
          <div class="headline-meta">
            <span>Format: <strong>${FORMAT_LABEL[data.format] || data.format}</strong></span>
            <span>Questions: <strong>${(data.grades||[]).length}</strong></span>
            ${skipped.length > 0 ? `<span>Skipped: <strong>${skipped.length}</strong></span>` : ''}
            <span>Time: <strong>${fmtDuration(data.durationSec)}</strong></span>
          </div>
        </div>
      </div>
    `;

    // Per-topic breakdown
    const perTopic = data.perTopicScores || [];
    if (perTopic.length > 0) {
      html += `<div class="topic-card"><h2>By Topic</h2>`;
      perTopic.forEach(t => {
        const w = Math.max(2, t.avg);
        const tc = scoreClass(t.avg);
        html += `
          <div class="topic-row">
            <div class="topic-name">${TOPIC_LABEL[t.topic] || t.topic}</div>
            <div class="topic-bar-bg"><div class="topic-bar-fill ${tc}" style="width:0%"></div></div>
            <div class="topic-score ${tc}" style="color:${tc==='high'?'#15803D':tc==='mid'?'#B45309':'#B91C1C'};">${t.avg}</div>
          </div>`;
      });
      html += `</div>`;
    }

    // Strong answers
    if (strongAnswers.length > 0 && strongAnswers[0].score >= 75) {
      html += `<div class="answer-section"><h2>What worked</h2>`;
      strongAnswers.filter(a => a.score >= 75).forEach((a, i) => {
        html += renderAnswerCard(a, 'strong', data.answers, i);
      });
      html += `</div>`;
    }

    // Weak answers
    if (weakAnswers.length > 0) {
      html += `<div class="answer-section"><h2>Where the gaps are</h2>`;
      weakAnswers.forEach((a, i) => {
        html += renderAnswerCard(a, 'weak', data.answers, i + 100);
      });
      html += `</div>`;
    }

    // Skipped
    if (skipped.length > 0) {
      html += `<div class="answer-section"><h2>Skipped</h2>`;
      skipped.slice(0, 5).forEach((a, i) => {
        const topicCls = TOPIC_CLASS[a.topic] || 'accounting';
        html += `
          <div class="answer-card" style="opacity:.75;">
            <div class="answer-meta">
              <span class="q-tag ${topicCls}">${TOPIC_LABEL[a.topic] || a.topic}</span>
              <span style="font-size:12px;color:var(--text-tertiary);">No answer submitted</span>
            </div>
            <div class="answer-question">${escapeHtml(a.question_text)}</div>
          </div>`;
      });
      html += `</div>`;
    }

    // CTA bar
    html += `
      <div class="cta-bar">
        <div class="cta-bar-body">
          <div class="cta-bar-title">Drill these gaps next</div>
          <div class="cta-bar-sub">A focused practice set built from the questions you missed in this mock.</div>
        </div>
        <a class="btn-cta" href="${drillUrl}">Start focused drill →</a>
      </div>
      <div style="text-align:center;margin-top:18px;">
        <a href="mock-interview.html" style="font-size:13px;color:var(--text-tertiary);text-decoration:none;">← Run another mock</a>
      </div>
    `;

    document.getElementById('content').innerHTML = html;

    // Animate dial and bars in
    setTimeout(() => {
      const fill = document.getElementById('dialFill');
      if (fill) fill.style.strokeDashoffset = String(offset);
      document.querySelectorAll('.topic-bar-fill').forEach((bar, i) => {
        const t = perTopic[i];
        if (t) setTimeout(() => { bar.style.width = Math.max(2, t.avg) + '%'; }, 60);
      });
    }, 80);
  }

  function renderAnswerCard(a, kind, allAnswers, idx) {
    const topicCls = TOPIC_CLASS[a.topic] || 'accounting';
    const sCls = scoreClass(a.score);
    const submitted = (allAnswers || {})[a.questionId] || {};
    const elapsed = submitted.seconds_taken ? fmtDuration(submitted.seconds_taken) : '';
    return `
      <div class="answer-card ${kind}">
        <div class="answer-meta">
          <span class="q-tag ${topicCls}">${TOPIC_LABEL[a.topic] || a.topic}</span>
          <span class="answer-score ${sCls}">${a.score}<span style="font-size:11px;color:var(--text-tertiary);font-weight:400;">/100</span></span>
          ${elapsed ? `<span class="answer-time">${elapsed}</span>` : ''}
        </div>
        <div class="answer-question">${escapeHtml(a.question_text)}</div>
        ${a.verdict ? `<div class="answer-verdict" style="margin-top:8px;">"${escapeHtml(a.verdict)}"</div>` : ''}
        ${a.gaps && kind === 'weak' ? `<div class="answer-gaps"><strong>Gap:</strong> ${escapeHtml(a.gaps)}</div>` : ''}
        ${a.strengths && kind === 'strong' ? `<div class="answer-strengths"><strong>Strength:</strong> ${escapeHtml(a.strengths)}</div>` : ''}
        <button class="answer-expand" onclick="toggleDetail(${idx})">▶ Show your answer + model</button>
        <div class="answer-detail" id="detail-${idx}">
          <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;">Your answer</div>
          <div style="font-size:13px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;margin-bottom:14px;">${escapeHtml(submitted.answer || '(no answer)')}</div>
          <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;">Model answer</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;">${escapeHtml(a.model_answer || '')}</div>
        </div>
      </div>`;
  }

  function toggleDetail(idx) {
    const el = document.getElementById('detail-' + idx);
    if (el) el.classList.toggle('open');
  }

  if (token && sessionId) loadResult();
</script>

</body>
</html>
