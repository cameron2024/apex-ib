<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Billing — Apex</title>
<script>
  // Redirect to settings billing tab, preserving ?upgrade= param
  const upgrade = new URLSearchParams(location.search).get('upgrade');
  window.location.replace('settings.html?tab=billing' + (upgrade ? '&upgrade=' + upgrade : ''));
</script>
</head>
<body></body>
</html>
