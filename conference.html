<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conference — Apex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.conf-header {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 32px;
}
.conf-logo-wrap {
  width: 140px; height: 64px; border-radius: 14px;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; padding: 8px 14px;
}
.conf-logo-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
.conf-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -.4px; }
.conf-subtitle { font-size: 13.5px; color: var(--text-secondary); margin-top: 3px; }

/* KPI strip */
.conf-kpis {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 28px;
}
.conf-kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  position: relative; overflow: hidden;
}
.conf-kpi::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 var(--radius) var(--radius);
}
.conf-kpi.blue::after   { background: var(--accent-blue); }
.conf-kpi.green::after  { background: var(--accent-green); }
.conf-kpi.amber::after  { background: var(--accent-amber); }
.conf-kpi.purple::after { background: #7C3AED; }
.conf-kpi-label { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.conf-kpi-value { font-family: 'DM Serif Display', serif; font-size: 30px; letter-spacing: -.4px; line-height: 1; margin-bottom: 3px; }
.conf-kpi-sub   { font-size: 11.5px; color: var(--text-tertiary); }

/* School grid */
.schools-section-title {
  font-size: 13px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.schools-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px; margin-bottom: 32px;
}
.school-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s;
  text-decoration: none; display: block;
}
.school-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.07); }
.school-card.my-school { border-width: 2px; }

.school-card-banner {
  height: 56px; position: relative; overflow: hidden;
  background-size: 300% 300%;
  animation: schoolShimmer 5s ease infinite;
}
.school-card-banner::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 120%, rgba(255,255,255,.15) 0%, transparent 60%);
}
@keyframes schoolShimmer {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.school-card-body { padding: 14px 16px; }
.school-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.school-card-rank {
  font-family: 'DM Serif Display', serif; font-size: 18px;
  color: var(--text-tertiary); width: 24px; flex-shrink: 0;
}
.school-card-name { font-size: 14px; font-weight: 600; flex: 1; }
.school-card-you  { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; background: var(--text-primary); color: white; }

.school-card-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.school-metric { text-align: center; }
.school-metric-val { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: -.3px; line-height: 1; }
.school-metric-lbl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

/* IB placement table */
.scoresheet {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 28px;
}
.scoresheet-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.scoresheet-title { font-size: 13px; font-weight: 600; }
.scoresheet-sub { font-size: 11px; color: var(--text-tertiary); }

table.ss { width: 100%; border-collapse: collapse; }
table.ss th {
  font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: var(--text-tertiary); padding: 10px 16px; text-align: left;
  border-bottom: 1px solid var(--border); background: var(--bg);
  white-space: nowrap;
}
table.ss th.num, table.ss td.num { text-align: center; }
table.ss td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
table.ss tr:last-child td { border-bottom: none; }
table.ss tr:hover td { background: var(--bg); }
.ss-rank {
  font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text-tertiary);
  width: 28px; text-align: center;
}
.ss-rank.gold   { color: #D97706; }
.ss-rank.silver { color: #9CA3AF; }
.ss-rank.bronze { color: #B45309; }
.ss-school-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 600;
}
.ss-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.ss-you-tag {
  font-size: 9.5px; font-weight: 700; padding: 1px 6px; border-radius: 99px;
  background: var(--text-primary); color: white; margin-left: 4px;
}
.ss-score-cell { font-family: 'DM Serif Display', serif; font-size: 16px; }
.ss-bar-cell { display: flex; align-items: center; gap: 8px; }
.ss-bar-wrap { width: 60px; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
.ss-bar-fill { height: 100%; border-radius: 99px; }

.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

@media (max-width: 768px) {
  .conf-kpis { grid-template-columns: repeat(2, 1fr); }
  .schools-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body data-page="feed">
<div id="sidebar-mount"></div>
<main class="main">

  <div class="conf-header fade-1" id="confHeader">
    <div class="conf-logo-wrap"><div class="skeleton" style="width:44px;height:44px;border-radius:8px;"></div></div>
    <div>
      <div class="conf-title" id="confTitle">—</div>
      <div class="conf-subtitle" id="confSubtitle">Loading…</div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="conf-kpis fade-2" id="confKpis">
    <div class="conf-kpi blue"><div class="conf-kpi-label">Apex Users</div><div class="conf-kpi-value skeleton" style="height:30px;width:60px;">&nbsp;</div></div>
    <div class="conf-kpi green"><div class="conf-kpi-label">Avg Score</div><div class="conf-kpi-value skeleton" style="height:30px;width:60px;">&nbsp;</div></div>
    <div class="conf-kpi amber"><div class="conf-kpi-label">Total Answers</div><div class="conf-kpi-value skeleton" style="height:30px;width:60px;">&nbsp;</div></div>
    <div class="conf-kpi purple"><div class="conf-kpi-label">Active This Week</div><div class="conf-kpi-value skeleton" style="height:30px;width:60px;">&nbsp;</div></div>
  </div>

  <!-- School leaderboard -->
  <div class="schools-section-title fade-2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    School Rankings — Apex Performance
  </div>
  <div class="schools-grid fade-2" id="schoolsGrid">
    <div class="school-card"><div class="school-card-banner" style="background:#EDEAE4;"></div><div class="school-card-body"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;">&nbsp;</div><div class="skeleton" style="height:40px;">&nbsp;</div></div></div>
    <div class="school-card"><div class="school-card-banner" style="background:#EDEAE4;"></div><div class="school-card-body"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;">&nbsp;</div><div class="skeleton" style="height:40px;">&nbsp;</div></div></div>
    <div class="school-card"><div class="school-card-banner" style="background:#EDEAE4;"></div><div class="school-card-body"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;">&nbsp;</div><div class="skeleton" style="height:40px;">&nbsp;</div></div></div>
    <div class="school-card"><div class="school-card-banner" style="background:#EDEAE4;"></div><div class="school-card-body"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;">&nbsp;</div><div class="skeleton" style="height:40px;">&nbsp;</div></div></div>
  </div>

  <!-- Apex conference scoresheet -->
  <div class="scoresheet fade-3">
    <div class="scoresheet-header">
      <div class="scoresheet-title">Conference Scoresheet — Apex Performance</div>
      <div class="scoresheet-sub">Ranked by average score</div>
    </div>
    <table class="ss" id="scoresheetTable">
      <thead><tr>
        <th></th>
        <th>School</th>
        <th class="num">Avg Score</th>
        <th class="num">Apex Users</th>
        <th class="num">Total Answers</th>
        <th class="num">This Week</th>
      </tr></thead>
      <tbody id="scoresheetBody"></tbody>
    </table>
  </div>

</main>
<script src="sidebar.js"></script>
<script>
const token = localStorage.getItem('apex_token');
if (!token) window.location.href = 'auth.html';

const CONF_NAME = new URLSearchParams(location.search).get('name') || 'NESCAC';

// ── School color palette — extensible ──────────────────────
const SCHOOL_COLORS = {
  'Amherst College':      { c1:'#3f1f69', c2:'#7C5CBF', c3:'#311a4d' },
  'Williams College':     { c1:'#500082', c2:'#FFD700', c3:'#3a0060' },
  'Middlebury College':   { c1:'#003087', c2:'#6FA8DC', c3:'#001f5b' },
  'Bowdoin College':      { c1:'#000000', c2:'#FFFFFF', c3:'#222222' },
  'Colby College':        { c1:'#004B8D', c2:'#AAAAAA', c3:'#003366' },
  'Hamilton College':     { c1:'#003087', c2:'#D4AF37', c3:'#001f5b' },
  'Trinity College':      { c1:'#003087', c2:'#8B8B00', c3:'#001f5b' },
  'Wesleyan University':  { c1:'#CC0000', c2:'#000000', c3:'#990000' },
  'Tufts University':     { c1:'#3E8EDE', c2:'#4F2D7F', c3:'#1a6cc0' },
  'Bates College':        { c1:'#820000', c2:'#FFFFFF', c3:'#5c0000' },
  'Connecticut College':  { c1:'#003087', c2:'#8B0000', c3:'#001f5b' },
  // Ivy League
  'Harvard University':   { c1:'#A51C30', c2:'#000000', c3:'#7a1323' },
  'Yale University':      { c1:'#00356B', c2:'#ADB3C1', c3:'#001f40' },
  'Princeton University': { c1:'#FF6600', c2:'#000000', c3:'#cc5200' },
  'Columbia University':  { c1:'#003087', c2:'#69B3E7', c3:'#001f5b' },
  'Dartmouth College':    { c1:'#00693E', c2:'#FFFFFF', c3:'#004d2d' },
  'Brown University':     { c1:'#4E3629', c2:'#C00404', c3:'#3a2a20' },
  'Cornell University':   { c1:'#B31B1B', c2:'#222222', c3:'#8a1414' },
  'University of Pennsylvania': { c1:'#011F5B', c2:'#990000', c3:'#000f30' },
};

// Conference logo map
const CONF_LOGOS = {
  'NESCAC': 'nescac_logo.webp',
};

function scoreColor(s) {
  if (!s || s === 0) return 'var(--text-tertiary)';
  if (s >= 80) return 'var(--accent-green)';
  if (s >= 60) return 'var(--accent-amber)';
  return 'var(--accent-red)';
}

function schoolBannerStyle(name) {
  const c = SCHOOL_COLORS[name] || { c1:'#444', c2:'#888', c3:'#222' };
  return `background:linear-gradient(135deg,${c.c1},${c.c2},${c.c3},${c.c1});background-size:300% 300%;`;
}

async function init() {
  const [confR, progressR] = await Promise.all([
    fetch(`/api/conference/page?name=${encodeURIComponent(CONF_NAME)}`, { headers:{'Authorization':'Bearer '+token}}),
    fetch('/api/progress/load', { headers:{'Authorization':'Bearer '+token}})
  ]);
  const conf = await confR.json();
  const progress = await progressR.json();

  if (window.initSidebarMenu) initSidebarMenu(progress.plan, progress.gradedToday);

  // Header
  const logoUrl = CONF_LOGOS[CONF_NAME];
  document.getElementById('confTitle').textContent = CONF_NAME;
  document.getElementById('confSubtitle').textContent =
    `${conf.schools?.length || 0} member schools · New England Small College Athletic Conference`;
  document.querySelector('.conf-logo-wrap').innerHTML = logoUrl
    ? `<img src="${logoUrl}" alt="${CONF_NAME}" onerror="this.outerHTML='<span style=font-size:22px;font-weight:700>${CONF_NAME[0]}</span>'">`
    : `<span style="font-size:22px;font-weight:700;">${CONF_NAME[0]}</span>`;

  // KPIs
  const t = conf.totals || {};
  const weeklyActive = conf.schools?.reduce((s,sc)=>s+parseInt(sc.answers_this_week||0),0) || 0;
  document.getElementById('confKpis').innerHTML = `
    <div class="conf-kpi blue">
      <div class="conf-kpi-label">Apex Users</div>
      <div class="conf-kpi-value">${parseInt(t.total_users||0).toLocaleString()}</div>
      <div class="conf-kpi-sub">across all schools</div>
    </div>
    <div class="conf-kpi green">
      <div class="conf-kpi-label">Avg Score</div>
      <div class="conf-kpi-value" style="color:${scoreColor(t.avg_score)}">${t.avg_score||'—'}<span style="font-size:14px;opacity:.6;font-family:'DM Sans',sans-serif;">/100</span></div>
      <div class="conf-kpi-sub">conference average</div>
    </div>
    <div class="conf-kpi amber">
      <div class="conf-kpi-label">Total Answers</div>
      <div class="conf-kpi-value">${parseInt(t.total_answers||0).toLocaleString()}</div>
      <div class="conf-kpi-sub">graded submissions</div>
    </div>
    <div class="conf-kpi purple">
      <div class="conf-kpi-label">Active This Week</div>
      <div class="conf-kpi-value">${weeklyActive.toLocaleString()}</div>
      <div class="conf-kpi-sub">answers submitted</div>
    </div>`;

  // School cards
  const schools = conf.schools || [];
  const mySchool = conf.mySchool;
  document.getElementById('schoolsGrid').innerHTML = schools.map((sc, i) => {
    const isMine = sc.name === mySchool;
    const borderColor = isMine && SCHOOL_COLORS[sc.name] ? SCHOOL_COLORS[sc.name].c1 : '';
    return `
      <a class="school-card${isMine ? ' my-school' : ''}" href="school.html?name=${encodeURIComponent(sc.name)}"
         style="${isMine && borderColor ? `border-color:${borderColor};` : ''}">
        <div class="school-card-banner" style="${schoolBannerStyle(sc.name)}"></div>
        <div class="school-card-body">
          <div class="school-card-top">
            <div class="school-card-rank">#${i+1}</div>
            <div class="school-card-name">${sc.name}</div>
            ${isMine ? `<span class="school-card-you">You</span>` : ''}
          </div>
          <div class="school-card-metrics">
            <div class="school-metric">
              <div class="school-metric-val" style="color:${scoreColor(sc.avg_score)}">${sc.avg_score||'—'}</div>
              <div class="school-metric-lbl">Avg Score</div>
            </div>
            <div class="school-metric">
              <div class="school-metric-val">${parseInt(sc.total_answers||0).toLocaleString()}</div>
              <div class="school-metric-lbl">Answers</div>
            </div>
            <div class="school-metric">
              <div class="school-metric-val">${parseInt(sc.apex_users||0)}</div>
              <div class="school-metric-lbl">Users</div>
            </div>
          </div>
        </div>
      </a>`;
  }).join('');

  // Conference scoresheet — real Apex data, ranked by avg score
  const maxAnswers = Math.max(...schools.map(s => parseInt(s.total_answers||0)), 1);
  document.getElementById('scoresheetBody').innerHTML = schools.map((sc, i) => {
    const c = SCHOOL_COLORS[sc.name];
    const dot = c ? `<span class="ss-dot" style="background:${c.c1};"></span>` : '';
    const isMine = sc.name === mySchool;
    const answerPct = Math.round((parseInt(sc.total_answers||0) / maxAnswers) * 100);
    return `<tr${isMine ? ' style="background:rgba(0,0,0,.02);"' : ''}>
      <td class="ss-rank ${rankClass(i)}">#${i+1}</td>
      <td><span class="ss-school-badge">${dot}${sc.name}${isMine ? '<span class="ss-you-tag">You</span>' : ''}</span></td>
      <td class="num"><span class="ss-score-cell" style="color:${scoreColor(sc.avg_score)}">${sc.avg_score||'—'}</span></td>
      <td class="num">${parseInt(sc.apex_users||0)}</td>
      <td class="num">
        <div class="ss-bar-cell" style="justify-content:center;">
          <div class="ss-bar-wrap"><div class="ss-bar-fill" style="width:${answerPct}%;background:${c ? c.c1 : 'var(--text-tertiary)'};"></div></div>
          <span>${parseInt(sc.total_answers||0).toLocaleString()}</span>
        </div>
      </td>
      <td class="num">${parseInt(sc.answers_this_week||0)}</td>
    </tr>`;
  }).join('');
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

init().catch(e => console.error(e));
</script>
</body>
</html>
