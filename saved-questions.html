<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Questions — Apex</title>
<link rel="stylesheet" href="shared.css">
<script src="sidebar.js"></script>

<style>

  
  

  

  

  

  

  

  

  
  
  
  

  

  

  

  
  

  
  

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: fadeUp 0.35s ease both;
  }

  

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.4px;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .page-sub { font-size: 14px; color: var(--text-secondary); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.35s ease 0.05s both;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .filter-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  /* ── SAVED QUESTIONS LIST ── */
  .questions-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.35s ease 0.1s both;
  }

  .saved-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .saved-card:hover { border-color: var(--border-strong); }

  .saved-card-

  .saved-q-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .saved-q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .q-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .q-tag.accounting  { background: #EEF2FF; color: #4338CA; }
  .q-tag.enterprise  { background: #FFF7ED; color: #C2410C; }
  .q-tag.valuation   { background: #F0FDF4; color: #15803D; }
  .q-tag.dcf         { background: #EFF6FF; color: #1D4ED8; }
  .q-tag.mergers     { background: #FDF4FF; color: #7E22CE; }
  .q-tag.lbo         { background: #FFF1F2; color: #BE123C; }
  .q-tag.difficulty  { background: var(--bg); color: var(--text-tertiary); }

  .saved-date { font-size: 11.5px; color: var(--text-tertiary); margin-left: auto; }

  .saved-card-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    align-self: center;
  }

  .btn-practice-saved {
    padding: 7px 14px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .btn-practice-saved:hover { opacity: 0.85; }

  .btn-unsave {
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: inherit;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-unsave:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* ── ANSWER DRAWER ── */
  .answer-drawer {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
    margin: 12px -20px -18px;
    padding: 16px 20px;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .answer-drawer.open { display: block; }

  .answer-drawer-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  .answer-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }

  .toggle-answer-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    color: var(--accent-blue);
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    margin-top: 4px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--text-tertiary);
    animation: fadeUp 0.35s ease both;
  }

  .empty-icon { font-size: 36px; margin-bottom: 16px; }
  .empty-title { font-size: 17px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; max-width: 320px; margin: 0 auto 24px; }

  .btn-go-practice {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-go-practice:hover { opacity: 0.85; }

  
  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  

  </style>
</head>

<body data-page="saved">

<div id="sidebar-mount"></div>

<!-- MAIN -->
<main class="main">

  <div class="page-header">
    <div>
      <div class="page-title">Saved Questions</div>
      <div class="page-sub" id="pageSubtitle">Your personal question bank</div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="Accounting" onclick="setFilter('Accounting', this)">Accounting</button>
    <button class="filter-btn" data-filter="Enterprise_Value" onclick="setFilter('Enterprise_Value', this)">Enterprise Value</button>
    <button class="filter-btn" data-filter="Valuation" onclick="setFilter('Valuation', this)">Valuation</button>
    <button class="filter-btn" data-filter="DCF" onclick="setFilter('DCF', this)">Discounted Cash Flow</button>
    <button class="filter-btn" data-filter="Mergers_MA" onclick="setFilter('Mergers_MA', this)">M&amp;A</button>
    <button class="filter-btn" data-filter="LBO" onclick="setFilter('LBO', this)">Leveraged Buyouts</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="questions-list" id="questionsList"></div>

</main>

<script>
  // ── AUTH ──
  const token = localStorage.getItem('apex_token');
  const name = localStorage.getItem('apex_user');
  if (name) {
    const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('sidebarUserName').textContent = name;
  }

  // Fetch plan
  if (token) {
    fetch('/api/progress/load', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(data => {
        window._userPlan = data.plan || 'free';
        window._gradedToday = data.gradedToday || 0;
        window._memberSince = data.memberSince || null;
        initSidebarMenu(window._userPlan, window._gradedToday);
      }).catch(() => {});
  }


  // ── DATA ──
  const TOPIC_LABELS = {
    'Accounting': 'Accounting',
    'Enterprise_Value': 'Enterprise Value',
    'Valuation': 'Valuation',
    'DCF': 'Discounted Cash Flow',
    'Mergers_MA': 'Mergers & Acquisitions',
    'LBO': 'Leveraged Buyouts'
  };

  const TOPIC_CLASS = {
    'Accounting': 'accounting',
    'Enterprise_Value': 'enterprise',
    'Valuation': 'valuation',
    'DCF': 'dcf',
    'Mergers_MA': 'mergers',
    'LBO': 'lbo'
  };

  function getSaved() {
    try { return JSON.parse(localStorage.getItem('apex_saved_questions') || '[]'); }
    catch(e) { return []; }
  }

  function unsave(qId) {
    const saved = getSaved().filter(q => q.id !== qId);
    localStorage.setItem('apex_saved_questions', JSON.stringify(saved));
    render();
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  let currentFilter = 'all';

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function toggleAnswer(qId) {
    const drawer = document.getElementById('drawer-' + qId);
    const btn = document.getElementById('toggle-' + qId);
    if (drawer.classList.contains('open')) {
      drawer.classList.remove('open');
      btn.textContent = '▶ Show model answer';
    } else {
      drawer.classList.add('open');
      btn.textContent = '▼ Hide model answer';
    }
  }

  function practiceThis(qId) {
    // Navigate to the topic that contains this question, it will load via smart ordering
    const saved = getSaved();
    const q = saved.find(s => s.id === qId);
    if (q) {
      window.location.href = `practice-screen.html?topic=${q.topic}&focus=${qId}`;
    }
  }

  function render() {
    const all = getSaved();
    const filtered = currentFilter === 'all' ? all : all.filter(q => q.topic === currentFilter);

    // Update count
    const countEl = document.getElementById('filterCount');
    countEl.textContent = filtered.length === 0 ? '' : `${filtered.length} question${filtered.length !== 1 ? 's' : ''}`;

    // Update subtitle
    document.getElementById('pageSubtitle').textContent =
      all.length === 0 ? 'Questions you bookmark during practice will appear here' :
      `${all.length} question${all.length !== 1 ? 's' : ''} saved`;

    const list = document.getElementById('questionsList');

    if (filtered.length === 0) {
      if (all.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔖</div>
            <div class="empty-title">No saved questions yet</div>
            <div class="empty-sub">While practicing, tap the bookmark icon on any question to save it here for focused review.</div>
            <a class="btn-go-practice" href="practice-screen.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              Start Practicing
            </a>
          </div>`;
      } else {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No saved questions in this topic</div>
            <div class="empty-sub">You have ${all.length} saved question${all.length !== 1 ? 's' : ''} in other topics.</div>
          </div>`;
      }
      return;
    }

    // Sort newest first
    const sorted = [...filtered].sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));

    list.innerHTML = sorted.map(q => {
      const topicLabel = TOPIC_LABELS[q.topic] || q.topic;
      const topicClass = TOPIC_CLASS[q.topic] || 'accounting';
      const diffLabel = q.difficulty === 'hard' ? 'Advanced' : 'Basic';
      const dateStr = q.savedAt ? formatDate(q.savedAt) : '';
      const safeId = CSS.escape ? CSS.escape(q.id) : q.id.replace(/[^a-zA-Z0-9_-]/g, '_');
      const answerId = 'drawer-' + safeId;
      const toggleId = 'toggle-' + safeId;

      return `
        <div class="saved-card" id="card-${safeId}">
          <div class="saved-card-body">
            <div class="saved-q-text">${escapeHtml(q.question)}</div>
            <div class="saved-q-meta">
              <span class="q-tag ${topicClass}">${topicLabel}</span>
              <span class="q-tag difficulty">${diffLabel}</span>
              ${dateStr ? `<span class="saved-date">Saved ${dateStr}</span>` : ''}
            </div>
            ${q.model_answer ? `
              <button class="toggle-answer-btn" id="${toggleId}" onclick="toggleAnswer('${safeId}')">▶ Show model answer</button>
              <div class="answer-drawer" id="${answerId}">
                <div class="answer-drawer-label">Model Answer</div>
                <div class="answer-text">${escapeHtml(q.model_answer)}</div>
              </div>
            ` : ''}
          </div>
          <div class="saved-card-actions">
            <button class="btn-practice-saved" onclick="practiceThis('${q.id}')">Practice →</button>
            <button class="btn-unsave" onclick="unsave('${q.id}')">Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Show sign-in wall for guests
  if (!localStorage.getItem('apex_token')) {
    document.querySelector('.main').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;">
        <div style="font-size:40px;">🔖</div>
        <h2 style="font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.3px;color:var(--text-primary);">Saved questions need an account</h2>
        <p style="font-size:14px;color:var(--text-secondary);max-width:360px;line-height:1.65;">
          Bookmark questions for focused review and revisit them anytime. Create a free account to start saving.
        </p>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <a href="auth.html?mode=register" style="padding:10px 20px;background:var(--text-primary);color:white;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">Create free account</a>
          <a href="auth.html" style="padding:10px 20px;background:white;color:var(--text-primary);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">Sign in</a>
        </div>
        <a href="practice-screen.html" style="font-size:13px;color:var(--text-tertiary);text-decoration:none;margin-top:4px;">← Back to practice</a>
      </div>`;
  } else {
  // Init
  render();

  } // end else (logged in)

</script>

</body>
</html>
