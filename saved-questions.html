<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Questions — Apex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: fadeUp 0.35s ease both;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.4px;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .page-sub { font-size: 14px; color: var(--text-secondary); }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.35s ease 0.05s both;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .filter-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  .questions-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.35s ease 0.1s both;
  }

  .saved-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s;
  }

  .saved-card:hover { border-color: var(--border-strong); }

  .saved-card-body { flex: 1; min-width: 0; }

  .saved-q-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .saved-q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .q-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .q-tag.accounting  { background: #EEF2FF; color: #4338CA; }
  .q-tag.enterprise  { background: #FFF7ED; color: #C2410C; }
  .q-tag.valuation   { background: #F0FDF4; color: #15803D; }
  .q-tag.dcf         { background: #EFF6FF; color: #1D4ED8; }
  .q-tag.mergers     { background: #FDF4FF; color: #7E22CE; }
  .q-tag.lbo         { background: #FFF1F2; color: #BE123C; }
  .q-tag.difficulty  { background: var(--bg); color: var(--text-tertiary); }

  .saved-date { font-size: 11.5px; color: var(--text-tertiary); margin-left: auto; }

  .saved-card-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    align-self: center;
  }

  .btn-practice-saved {
    padding: 7px 14px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .btn-practice-saved:hover { opacity: 0.85; }

  .btn-unsave {
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: inherit;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-unsave:hover { border-color: var(--accent-red); color: var(--accent-red); }

  .answer-drawer {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
    margin: 12px -20px -18px;
    padding: 16px 20px;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .answer-drawer.open { display: block; }

  .answer-drawer-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  .answer-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }

  .toggle-answer-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    color: var(--accent-blue);
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--text-tertiary);
    animation: fadeUp 0.35s ease both;
  }

  .empty-icon { font-size: 36px; margin-bottom: 16px; }
  .empty-title { font-size: 17px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; max-width: 320px; margin: 0 auto 24px; }

  .btn-go-practice {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-go-practice:hover { opacity: 0.85; }

  /* Migration toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text-primary);
    color: white;
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    z-index: 100;
    animation: fadeUp 0.3s ease both;
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    font-size: 14px;
  }
</style>
</head>

<body data-page="saved">

<div id="sidebar-mount"></div>
<script src="sidebar.js"></script>

<main class="main">

  <div class="page-header">
    <div>
      <div class="page-title">Saved Questions</div>
      <div class="page-sub" id="pageSubtitle">Your personal question bank</div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="Accounting" onclick="setFilter('Accounting', this)">Accounting</button>
    <button class="filter-btn" data-filter="Enterprise_Value" onclick="setFilter('Enterprise_Value', this)">Enterprise Value</button>
    <button class="filter-btn" data-filter="Valuation" onclick="setFilter('Valuation', this)">Valuation</button>
    <button class="filter-btn" data-filter="DCF" onclick="setFilter('DCF', this)">Discounted Cash Flow</button>
    <button class="filter-btn" data-filter="Mergers_MA" onclick="setFilter('Mergers_MA', this)">M&amp;A</button>
    <button class="filter-btn" data-filter="LBO" onclick="setFilter('LBO', this)">Leveraged Buyouts</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="questions-list" id="questionsList">
    <div class="loading-state">Loading your saved questions…</div>
  </div>

</main>


<script>
  // ── AUTH ──
  const token = localStorage.getItem('apex_token');
  const name = localStorage.getItem('apex_user');

  // Show sign-in wall for guests immediately
  if (!token) {
    document.querySelector('.main').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;">
        <div style="font-size:40px;">🔖</div>
        <h2 style="font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.3px;color:var(--text-primary);">Saved questions need an account</h2>
        <p style="font-size:14px;color:var(--text-secondary);max-width:360px;line-height:1.65;">
          Bookmark questions for focused review and revisit them anytime, on any device. Create a free account to start saving.
        </p>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <a href="auth.html?mode=register" style="padding:10px 20px;background:var(--text-primary);color:white;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">Create free account</a>
          <a href="auth.html" style="padding:10px 20px;background:white;color:var(--text-primary);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">Sign in</a>
        </div>
        <a href="practice-screen.html" style="font-size:13px;color:var(--text-tertiary);text-decoration:none;margin-top:4px;">← Back to practice</a>
      </div>`;
  }

  // Sidebar identity
  if (name && token) {
    const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    if (document.getElementById('sidebarAvatar')) document.getElementById('sidebarAvatar').textContent = initials;
    if (document.getElementById('sidebarUserName')) document.getElementById('sidebarUserName').textContent = name;
  }

  // Fetch plan for sidebar
  if (token) {
    fetch('/api/progress/load', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(data => {
        window._userPlan = data.plan || 'free';
        window._gradedToday = data.gradedToday || 0;
        window._memberSince = data.memberSince || null;
        if (typeof initSidebarMenu === 'function') initSidebarMenu(window._userPlan, window._gradedToday);
      }).catch(() => {});
  }

  // ── DATA / CONSTANTS ──
  const TOPIC_LABELS = {
    'Accounting': 'Accounting',
    'Enterprise_Value': 'Enterprise Value',
    'Valuation': 'Valuation',
    'DCF': 'Discounted Cash Flow',
    'Mergers_MA': 'Mergers & Acquisitions',
    'LBO': 'Leveraged Buyouts'
  };

  const TOPIC_CLASS = {
    'Accounting': 'accounting',
    'Enterprise_Value': 'enterprise',
    'Valuation': 'valuation',
    'DCF': 'dcf',
    'Mergers_MA': 'mergers',
    'LBO': 'lbo'
  };

  let currentFilter = 'all';
  let _savedItems = []; // [{id, savedAt, question: {...}}]

  // ── API ──
  async function apiList() {
    const r = await fetch('/api/saved/list', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) throw new Error('Failed to load');
    const data = await r.json();
    return data.items || [];
  }

  async function apiRemove(questionId) {
    const r = await fetch('/api/saved/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ questionId })
    });
    return r.ok;
  }

  async function apiMigrate(questionIds) {
    const r = await fetch('/api/saved/migrate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ questionIds })
    });
    return r.ok ? (await r.json()) : null;
  }

  // ── ONE-TIME MIGRATION FROM LOCALSTORAGE ──
  async function migrateIfNeeded() {
    try {
      const raw = localStorage.getItem('apex_saved_questions');
      if (!raw) return 0;
      let parsed;
      try { parsed = JSON.parse(raw); } catch(e) { localStorage.removeItem('apex_saved_questions'); return 0; }
      if (!Array.isArray(parsed) || parsed.length === 0) {
        localStorage.removeItem('apex_saved_questions');
        return 0;
      }
      const ids = parsed.map(q => q && q.id).filter(Boolean);
      if (ids.length === 0) {
        localStorage.removeItem('apex_saved_questions');
        return 0;
      }
      const result = await apiMigrate(ids);
      localStorage.removeItem('apex_saved_questions');
      return result?.migrated || 0;
    } catch(e) { return 0; }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  // ── FILTERS / RENDER ──
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function toggleAnswer(safeId) {
    const drawer = document.getElementById('drawer-' + safeId);
    const btn = document.getElementById('toggle-' + safeId);
    if (!drawer || !btn) return;
    if (drawer.classList.contains('open')) {
      drawer.classList.remove('open');
      btn.textContent = '▶ Show model answer';
    } else {
      drawer.classList.add('open');
      btn.textContent = '▼ Hide model answer';
    }
  }

  function practiceThis(qId, topic) {
    window.location.href = `practice-screen.html?topic=${encodeURIComponent(topic)}&focus=${encodeURIComponent(qId)}`;
  }

  async function unsave(qId) {
    const ok = await apiRemove(qId);
    if (ok) {
      _savedItems = _savedItems.filter(s => s.id !== qId);
      render();
    } else {
      alert('Failed to remove. Try again.');
    }
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function safeIdFor(qid) {
    return String(qid).replace(/[^a-zA-Z0-9_-]/g, '_');
  }

  function render() {
    const all = _savedItems;
    const filtered = currentFilter === 'all'
      ? all
      : all.filter(item => item.question.topic === currentFilter);

    document.getElementById('filterCount').textContent =
      filtered.length === 0 ? '' : `${filtered.length} question${filtered.length !== 1 ? 's' : ''}`;

    document.getElementById('pageSubtitle').textContent =
      all.length === 0 ? 'Questions you bookmark during practice will appear here' :
      `${all.length} question${all.length !== 1 ? 's' : ''} saved`;

    const list = document.getElementById('questionsList');

    if (filtered.length === 0) {
      if (all.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔖</div>
            <div class="empty-title">No saved questions yet</div>
            <div class="empty-sub">While practicing, tap the bookmark icon on any question to save it here for focused review.</div>
            <a class="btn-go-practice" href="practice-screen.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              Start Practicing
            </a>
          </div>`;
      } else {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No saved questions in this topic</div>
            <div class="empty-sub">You have ${all.length} saved question${all.length !== 1 ? 's' : ''} in other topics.</div>
          </div>`;
      }
      return;
    }

    list.innerHTML = filtered.map(item => {
      const q = item.question;
      const topicLabel = TOPIC_LABELS[q.topic] || q.topic;
      const topicClass = TOPIC_CLASS[q.topic] || 'accounting';
      const diffLabel = q.difficulty === 'hard' ? 'Advanced' : 'Basic';
      const dateStr = formatDate(item.savedAt);
      const safeId = safeIdFor(item.id);

      return `
        <div class="saved-card" id="card-${safeId}">
          <div class="saved-card-body">
            <div class="saved-q-text">${escapeHtml(q.question)}</div>
            <div class="saved-q-meta">
              <span class="q-tag ${topicClass}">${topicLabel}</span>
              <span class="q-tag difficulty">${diffLabel}</span>
              ${dateStr ? `<span class="saved-date">Saved ${dateStr}</span>` : ''}
            </div>
            ${q.model_answer ? `
              <button class="toggle-answer-btn" id="toggle-${safeId}" onclick="toggleAnswer('${safeId}')">▶ Show model answer</button>
              <div class="answer-drawer" id="drawer-${safeId}">
                <div class="answer-drawer-label">Model Answer</div>
                <div class="answer-text">${escapeHtml(q.model_answer)}</div>
              </div>
            ` : ''}
          </div>
          <div class="saved-card-actions">
            <button class="btn-practice-saved" onclick="practiceThis('${escapeHtml(item.id)}','${escapeHtml(q.topic)}')">Practice →</button>
            <button class="btn-unsave" onclick="unsave('${escapeHtml(item.id)}')">Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── BOOT ──
  (async function init() {
    if (!token) return;
    const migrated = await migrateIfNeeded();
    try {
      _savedItems = await apiList();
      render();
      if (migrated > 0) {
        showToast(`✓ Synced ${migrated} bookmark${migrated !== 1 ? 's' : ''} to your account — now available on all devices.`);
      }
    } catch(e) {
      document.getElementById('questionsList').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-title">Couldn't load saved questions</div><div class="empty-sub">${escapeHtml(e.message)}. Try refreshing the page.</div></div>`;
    }
  })();
</script>

</body>
</html>
